<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind Slide Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050716;
            --obsidian-2: #0B0E25;
            --accent: #60A5FA;
            --accent2: #34D399;
            --white: #F8FAFC;
            --silver: #94A3B8;
            --glass: rgba(11, 15, 36, 0.55);
            --glass-strong: rgba(11, 15, 36, 0.75);
            --line: rgba(255, 255, 255, 0.07);
            --shadow: 0 30px 70px rgba(0, 0, 0, 0.65);
            --deck-scale: 1;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.12), transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.1), transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.06), transparent 60%),
                var(--obsidian);
            color: var(--white);
            font-family: "Inter", system-ui, sans-serif;
            letter-spacing: -0.01em;
        }

        body {
            display: grid;
            place-items: center;
            padding-bottom: 88px;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .topbar {
            position: fixed;
            top: 18px;
            left: 24px;
            right: 24px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            pointer-events: none;
        }

        .brand,
        .nav,
        .export-btn {
            pointer-events: auto;
            backdrop-filter: blur(16px);
            background: rgba(8, 10, 24, 0.75);
            border: 1px solid var(--line);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 46px;
            padding: 0 16px;
            border-radius: 10px;
            color: var(--white);
            font-family: "Outfit", sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .brand-mark {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .export-btn,
        .nav button {
            height: 46px;
            border: 1px solid var(--line);
            color: var(--white);
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .export-btn {
            border-radius: 10px;
            padding: 0 20px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(16, 185, 129, 0.05));
            letter-spacing: 0.02em;
        }

        .export-btn:hover,
        .nav button:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
        }

        .deck-shell {
            width: 1280px;
            aspect-ratio: 16 / 9;
            transform: scale(var(--deck-scale));
            transform-origin: center center;
            position: relative;
            z-index: 5;
        }

        .slide-container {
            position: absolute;
            inset: 0;
            width: 1280px;
            height: 720px;
            aspect-ratio: 16 / 9;
            display: none;
            overflow: hidden;
            padding: 44px 54px 54px;
            box-sizing: border-box;
            border-radius: 20px;
            background:
                radial-gradient(circle at 5% 5%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 35%),
                radial-gradient(circle at 95% 95%, color-mix(in srgb, var(--accent2) 15%, transparent), transparent 40%),
                linear-gradient(135deg, #090b16 0%, #05060e 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: var(--shadow);
        }

        .slide-container.active {
            display: flex;
            flex-direction: column;
            animation: deckEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-container.active > .slide-inner {
            flex: 1 1 0;
            min-height: 0;
        }

        @keyframes deckEnter {
            from { opacity: 0; transform: translateY(16px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .slide-container.cover.active {
            background:
                radial-gradient(circle at 0% 0%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 45%),
                radial-gradient(circle at 100% 100%, color-mix(in srgb, var(--accent2) 15%, transparent), transparent 45%),
                linear-gradient(135deg, #090b16 0%, #05060e 100%);
        }

        .slide-container.metrics.active {
            background:
                radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 50%),
                linear-gradient(135deg, #070914 0%, #04050b 100%);
        }

        .slide-container.summary.active,
        .slide-container.architecture.active {
            background:
                radial-gradient(circle at 80% 20%, color-mix(in srgb, var(--accent2) 8%, transparent), transparent 40%),
                radial-gradient(circle at 20% 80%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 40%),
                linear-gradient(135deg, #080a18 0%, #05060d 100%);
        }

        .slide-container.conclusion.active {
            background:
                radial-gradient(circle at 90% 50%, color-mix(in srgb, var(--accent2) 15%, transparent), transparent 45%),
                linear-gradient(135deg, #080a18 0%, #04050a 100%);
        }

        .stale-banner {
            position: fixed;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            max-width: 720px;
            padding: 10px 18px;
            border-radius: 10px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            font-size: 0.82rem;
            font-weight: 600;
            text-align: center;
            backdrop-filter: blur(10px);
            display: none;
        }

        .stale-banner.visible { display: block; }

        .slide-container::after {
            content: "";
            position: absolute;
            left: 54px;
            right: 54px;
            bottom: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .slide-inner {
            position: relative;
            z-index: 1;
            min-height: 0;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            box-sizing: border-box;
        }

        .slide-body-fill {
            flex: 1 1 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .slide-header,
        .slide-header-compact {
            flex-shrink: 0;
        }

        .slide-header {
            margin-bottom: 12px;
        }

        .slide-header-compact {
            margin-bottom: 16px;
        }

        .slide-header .kicker,
        .slide-header-compact .kicker {
            margin: 0 0 6px;
            line-height: 1.2;
        }

        .slide-header-compact .title.medium {
            font-size: 2.1rem;
            line-height: 1.2;
            margin: 0;
        }

        .kicker {
            color: var(--accent);
            font-family: "Outfit", sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .title {
            margin: 0;
            color: var(--white);
            font-family: "Outfit", sans-serif;
            font-size: 3.2rem;
            line-height: 1.15;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .title.medium {
            font-size: 2.1rem;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.015em;
        }

        .title-gradient {
            background: linear-gradient(135deg, var(--white) 35%, color-mix(in srgb, var(--accent) 70%, #fff) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .muted {
            color: var(--silver);
        }

        .glass {
            backdrop-filter: blur(20px);
            background: var(--glass);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-inner.cover {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
            grid-template-rows: 1fr;
            align-items: stretch;
            gap: 36px;
        }

        .cover-copy {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
            height: 100%;
            min-width: 0;
            min-height: 0;
            padding-right: 8px;
        }

        .cover .title {
            font-size: clamp(2.2rem, 3.5vw, 3.1rem);
            line-height: 1.15;
            letter-spacing: -0.03em;
            max-width: 100%;
            overflow-wrap: anywhere;
        }

        .cover-bullets {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 100%;
            flex: 1;
            min-height: 0;
            justify-content: center;
        }

        .cover-bullet,
        .action-card {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cover-bullet:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 15px color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .cover-bullet {
            position: relative;
            display: flex;
            align-items: center;
            padding: 14px 18px 14px 38px;
            min-height: 52px;
            max-height: 80px;
            color: #E2E8F0;
            font-size: 0.94rem;
            line-height: 1.45;
            font-weight: 500;
            flex-shrink: 0;
            overflow: hidden;
        }

        .cover-bullet span {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .cover-bullet::before {
            content: "";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .hero-visual {
            height: 100%;
            min-height: 0;
            max-height: 100%;
            align-self: stretch;
            position: relative;
            padding: 24px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            box-sizing: border-box;
            background: rgba(11, 15, 36, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        .hero-visual::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, color-mix(in srgb, var(--accent) 24%, transparent) 0%, transparent 68%);
            opacity: 0.85;
            pointer-events: none;
        }

        .hero-mesh {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 40%),
                radial-gradient(circle at 80% 70%, color-mix(in srgb, var(--accent2) 20%, transparent), transparent 40%);
            opacity: 0.85;
            pointer-events: none;
        }

        .hero-icon-ring {
            position: relative;
            z-index: 1;
            width: 96px;
            height: 96px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(5, 7, 20, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .hero-icon-ring svg {
            width: 42px;
            height: 42px;
            stroke-width: 1.5px;
        }

        .hero-visual-caption {
            position: relative;
            z-index: 1;
            margin: 0;
            max-width: 90%;
            text-align: center;
            color: #94A3B8;
            font-size: 0.88rem;
            line-height: 1.45;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-tags {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: auto;
            max-width: 100%;
        }

        .hero-tag {
            padding: 5px 12px;
            border-radius: 99px;
            background: rgba(5, 7, 20, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.07);
            color: var(--accent);
            font-family: "Outfit", sans-serif;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .summary-grid {
            flex: 1;
            display: grid;
            gap: 20px;
            min-height: 0;
        }

        .summary-card,
        .metric-card,
        .architecture-panel {
            --card-a: var(--accent);
            --card-b: var(--accent2);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 0;
            min-width: 0;
            border-radius: 16px;
            background: var(--glass);
            border: 1px solid var(--line);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .summary-card:hover,
        .metric-card:hover,
        .architecture-panel:hover {
            transform: translateY(-4px) scale(1.015);
            background: rgba(20, 24, 48, 0.7);
            border-color: var(--card-a);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.45),
                0 0 25px color-mix(in srgb, var(--card-a) 25%, transparent);
        }

        .summary-card-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .card-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-icon svg {
            width: 22px;
            height: 22px;
            stroke-width: 2px;
        }

        .card-index {
            margin-left: auto;
            width: 28px;
            height: 28px;
            display: grid;
            place-items: center;
            border-radius: 6px;
            background: rgba(5, 7, 20, 0.45);
            color: var(--card-a);
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            font-size: 0.72rem;
        }

        .card-text {
            margin: 0;
            color: #E2E8F0;
            font-size: 0.98rem;
            line-height: 1.48;
            font-weight: 500;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .architecture-layout {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .architecture-grid {
            flex: 1;
            display: grid;
            gap: 20px;
            min-height: 0;
            align-items: stretch;
        }

        .architecture-panel {
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .panel-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .panel-icon svg {
            width: 20px;
            height: 20px;
            stroke-width: 2px;
        }

        .panel-label {
            color: var(--accent);
            font-family: "Outfit", sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            line-height: 1.2;
        }

        .panel-body {
            color: #F1F5F9;
            font-size: clamp(1.05rem, 1.4vw, 1.25rem);
            line-height: 1.45;
            font-weight: 600;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            text-align: left;
            padding: 8px 0;
        }

        .panel-lines {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: auto;
            flex-shrink: 0;
        }

        .panel-lines span {
            height: 4px;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            opacity: 0.4;
        }

        .arch-flow-strip {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .arch-flow-step {
            flex: 1;
            text-align: center;
            padding: 6px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            color: #94A3B8;
            font-family: "Outfit", sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .arch-flow-arrow {
            color: var(--accent2);
            font-size: 0.88rem;
            font-weight: 700;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .slide-inner.metrics {
            gap: 12px;
        }

        .metrics-stage {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .metrics-grid {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 16px;
            flex: 1;
            min-height: 0;
            align-items: stretch;
        }

        .metric-card {
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0;
            height: 100%;
        }

        .metric-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .metric-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-icon svg {
            width: 20px;
            height: 20px;
            stroke-width: 2px;
        }

        .metric-chip {
            width: 26px;
            height: 26px;
            display: grid;
            place-items: center;
            border-radius: 6px;
            background: rgba(5, 7, 20, 0.4);
            color: var(--card-a);
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            font-size: 0.68rem;
        }

        .metric-label {
            color: #94A3B8;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .metric-value {
            margin: 0 0 6px;
            font-family: "Outfit", sans-serif;
            font-size: clamp(1.8rem, 2.5vw, 2.7rem);
            line-height: 1.1;
            font-weight: 800;
            background: linear-gradient(135deg, var(--card-a), var(--card-b));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: break-word;
        }

        .metric-value--long {
            font-size: clamp(1.3rem, 1.8vw, 1.7rem);
        }

        .metric-note {
            color: #CBD5E1;
            font-size: 0.84rem;
            line-height: 1.4;
            font-weight: 500;
            opacity: 0.9;
        }

        .metric-bar {
            height: 6px;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .metric-bar span {
            display: block;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--card-a), var(--card-b));
            animation: barGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes barGrow {
            from { width: 0 !important; }
        }

        /* Metric Layout Split style */
        .metric-card-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            width: 100%;
            height: 100%;
        }

        .metric-card-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        /* Gauge styles */
        .metric-gauge-wrap {
            position: relative;
            width: 76px;
            height: 76px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .metric-gauge-svg {
            width: 100%;
            height: 100%;
        }

        .gauge-bg {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .gauge-fill {
            stroke-linecap: round;
        }

        .metric-gauge-pct {
            position: absolute;
            font-family: "Outfit", sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.02em;
        }

        /* Trend badge */
        .metric-trend-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 99px;
            font-family: "Outfit", sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            margin-top: 8px;
            align-self: flex-start;
        }

        .metric-trend-badge.up {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.3);
            color: #34D399;
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.15);
        }

        .metric-trend-badge.down {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.3);
            color: #F87171;
            box-shadow: 0 0 15px rgba(248, 113, 113, 0.15);
        }

        /* Status pill */
        .metric-status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 12px;
            border-radius: 8px;
            font-family: "Outfit", sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818CF8;
            flex-shrink: 0;
            margin-top: 8px;
            align-self: flex-start;
        }

        .slide-inner.conclusion {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            grid-template-rows: 1fr;
            gap: 32px;
            align-items: stretch;
            flex: 1;
            min-height: 0;
        }

        .conclusion-copy {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 16px;
            height: 100%;
            min-height: 0;
        }

        .conclusion-timeline {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            padding-left: 24px;
            justify-content: center;
        }

        .conclusion-timeline::before {
            content: "";
            position: absolute;
            left: 8px;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            opacity: 0.35;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: 100%;
            min-height: 0;
            justify-content: center;
        }

        .action-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            min-height: 0;
            position: relative;
        }

        .action-card::before {
            content: "";
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            z-index: 2;
        }

        .action-card:hover {
            transform: translateX(4px);
            background: rgba(20, 24, 48, 0.45);
            border-color: var(--accent);
        }

        .action-number {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--accent);
            font-family: "Outfit", sans-serif;
            font-weight: 700;
            flex-shrink: 0;
        }

        .action-text {
            color: #E2E8F0;
            font-size: 0.96rem;
            line-height: 1.4;
            font-weight: 600;
        }

        /* Milestones panel on conclusion slide */
        .milestones-panel {
            height: 100%;
            min-height: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            background: rgba(11, 15, 36, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }

        .milestones-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at right bottom, color-mix(in srgb, var(--accent2) 15%, transparent), transparent 70%);
            pointer-events: none;
        }

        .milestone-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .milestone-check {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.4);
            color: #34D399;
            display: grid;
            place-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.2);
        }

        .milestone-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .milestone-title {
            font-family: "Outfit", sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .milestone-desc {
            font-size: 0.84rem;
            color: var(--silver);
            line-height: 1.45;
        }

        .slide-footer {
            position: absolute;
            left: 54px;
            right: 54px;
            bottom: 16px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.35);
            font-family: "Outfit", sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .nav {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 20;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 8px;
            border-radius: 14px;
            background: rgba(12, 14, 22, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(14px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        }

        .nav button {
            width: 48px;
            height: 48px;
            padding: 0;
            margin: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            font-size: 1.35rem;
            font-family: system-ui, sans-serif;
        }

        .nav button:disabled {
            opacity: 0.36;
            cursor: not-allowed;
        }

        .counter {
            min-width: 88px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #f0f0f4;
            font-family: "Outfit", sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        /* Premium Entrance Animations */
        .slide-container.active .cover-bullet,
        .slide-container.active .summary-card,
        .slide-container.active .architecture-panel,
        .slide-container.active .metric-card,
        .slide-container.active .action-card,
        .slide-container.active .hero-visual,
        .slide-container.active .milestones-panel,
        .slide-container.active .slide-header,
        .slide-container.active .slide-header-compact {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .slide-container.active .slide-header,
        .slide-container.active .slide-header-compact {
            animation-duration: 0.6s;
        }

        .slide-container.active .hero-visual,
        .slide-container.active .milestones-panel {
            transform: scale(0.965) translateY(10px);
            animation: scaleUpIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleUpIn {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Premium Layout Upgrades */
        
        /* Floating background decoration */
        .slide-bg-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.25;
            background-image: 
                radial-gradient(circle at 85% 15%, rgba(99, 102, 241, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 15% 85%, rgba(16, 185, 129, 0.08) 0%, transparent 45%);
            animation: bgGlowShift 10s ease-in-out infinite alternate;
        }
        @keyframes bgGlowShift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(2%, -1%); }
        }

        /* 3D Orbit system (Cover Right Side) */
        .orbit-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: grid;
            place-items: center;
            margin: 0 auto;
        }
        .orbit-svg {
            width: 100%;
            height: 100%;
            transform: rotateX(55deg) rotateY(-10deg);
            transform-style: preserve-3d;
        }
        .orbit-ring-slow {
            transform-origin: 100px 100px;
            animation: spinOrbit 30s linear infinite;
        }
        .orbit-ring-fast {
            transform-origin: 100px 100px;
            animation: spinOrbit 18s linear infinite;
        }
        .orbit-ring-reverse {
            transform-origin: 100px 100px;
            animation: spinOrbitReverse 14s linear infinite;
        }
        .orbit-node {
            transform-origin: 100px 100px;
            filter: drop-shadow(0 0 6px var(--accent2));
        }
        .node-1 {
            animation: spinOrbit 16s linear infinite;
        }
        .node-2 {
            animation: spinOrbitReverse 11s linear infinite;
        }
        .orbit-core {
            animation: corePulse 2s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 16px var(--accent));
        }
        @keyframes spinOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spinOrbitReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        @keyframes corePulse {
            0% { r: 12px; opacity: 0.75; }
            100% { r: 17px; opacity: 1; }
        }

        /* Spotlight Hero (Executive Summary) */
        .summary-card.hero-spotlight {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(20, 24, 48, 0.75) 0%, rgba(8, 10, 22, 0.9) 100%);
            border-color: var(--card-a);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.45),
                0 0 30px color-mix(in srgb, var(--card-a) 25%, transparent),
                inset 0 1px 2px rgba(255, 255, 255, 0.12);
            transform: scale(1.015);
            position: relative;
            overflow: hidden;
        }
        .summary-card.hero-spotlight::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 10%, color-mix(in srgb, var(--card-a) 15%, transparent) 0%, transparent 65%);
            pointer-events: none;
        }
        .summary-card.hero-spotlight .card-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            color: #FFF;
            -webkit-line-clamp: 5;
        }
        .summary-card.hero-spotlight .card-index {
            background: var(--card-a);
            color: var(--obsidian);
            transform: scale(1.12);
        }
        .summary-card.hero-spotlight .card-icon {
            background: color-mix(in srgb, var(--card-a) 12%, transparent);
            border-color: color-mix(in srgb, var(--card-a) 30%, transparent);
            transform: scale(1.08);
        }

        /* Pipeline Horizontal Chevrons (Architecture) */
        .architecture-grid.pipeline-mode {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 8px;
            width: 100%;
        }
        .architecture-grid.pipeline-mode .architecture-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        .pipeline-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent2);
            width: 24px;
            flex-shrink: 0;
            animation: pulseArrow 1.5s ease-in-out infinite alternate;
        }
        .pipeline-arrow svg {
            width: 22px;
            height: 22px;
            stroke-width: 2.5px;
        }
        @keyframes pulseArrow {
            0% { transform: scale(0.95); opacity: 0.5; filter: drop-shadow(0 0 0px var(--accent2)); }
            100% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 6px var(--accent2)); }
        }

        /* Dashboard Hero Metrics (Metrics) */
        .metrics-grid.dashboard-mode {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 20px;
            align-items: stretch;
            width: 100%;
        }
        .metric-hero-card {
            background: linear-gradient(135deg, rgba(20, 24, 48, 0.75) 0%, rgba(8, 10, 22, 0.9) 100%);
            border-color: var(--card-a);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.45),
                0 0 30px color-mix(in srgb, var(--card-a) 25%, transparent),
                inset 0 1px 2px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 28px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .metric-hero-card:hover {
            transform: translateY(-4px) scale(1.01);
            background: rgba(22, 26, 52, 0.85);
            border-color: var(--card-a);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 35px color-mix(in srgb, var(--card-a) 30%, transparent);
        }
        .metric-hero-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 10%, color-mix(in srgb, var(--card-a) 15%, transparent) 0%, transparent 65%);
            pointer-events: none;
        }
        .metric-hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }
        .metric-hero-top .metric-chip {
            background: var(--card-a);
            color: var(--obsidian);
            width: 32px;
            height: 32px;
            font-size: 0.75rem;
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-family: "Outfit", sans-serif;
            font-weight: 700;
        }
        .metric-hero-top .metric-icon {
            width: 44px;
            height: 44px;
            background: color-mix(in srgb, var(--card-a) 12%, transparent);
            border-color: color-mix(in srgb, var(--card-a) 30%, transparent);
            border-radius: 8px;
            border: 1px solid;
            display: grid;
            place-items: center;
        }
        .metric-hero-top .metric-icon svg {
            width: 24px;
            height: 24px;
        }
        .metric-hero-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex: 1;
            margin-top: 14px;
        }
        .metric-hero-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .metric-hero-right {
            flex-shrink: 0;
        }
        .metric-hero-card .metric-value {
            font-size: clamp(2.4rem, 3.2vw, 3.5rem);
            margin: 0;
            line-height: 1.05;
        }
        .metric-hero-card .metric-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--white);
        }
        .metric-hero-card .metric-note {
            font-size: 0.92rem;
            line-height: 1.45;
            color: #E2E8F0;
        }
        .metric-tiles-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: space-between;
        }
        .metric-tile-card {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-radius: 14px;
            background: var(--glass);
            border: 1px solid var(--line);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .metric-tile-card:hover {
            transform: translateY(-2px);
            background: rgba(20, 24, 48, 0.55);
            border-color: var(--card-a);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        }
        .metric-tile-left {
            flex: 1;
            min-width: 0;
            padding-right: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .metric-tile-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .metric-tile-card .metric-value {
            font-size: clamp(1.4rem, 1.8vw, 1.8rem);
            margin: 0;
            line-height: 1.1;
        }
        .metric-tile-card .metric-label {
            font-size: 0.72rem;
            font-weight: 700;
        }
        .metric-tile-card .metric-note {
            font-size: 0.76rem;
            opacity: 0.85;
            margin: 0;
        }

        /* Compact Radar targets on conclusion milestones */
        .radar-mini-widget {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            flex-shrink: 0;
            width: 100%;
        }
        .radar-mini-widget .radar-svg {
            width: 110px;
            height: 110px;
        }
        .radar-svg {
            transform-style: preserve-3d;
        }
        .radar-sweep {
            transform-origin: 100px 100px;
            animation: radarSweepRotate 4s linear infinite;
        }
        .blip {
            animation: blipPulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 5px currentColor);
        }
        .blip-1 { animation-delay: 0.5s; }
        .blip-2 { animation-delay: 1.2s; }
        .blip-3 { animation-delay: 0s; }
        
        @keyframes radarSweepRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes blipPulse {
            0%, 100% { opacity: 0.25; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.15); }
        }
        .slide-container.active .orbit-svg {
            opacity: 0;
            transform: scale(0.9) rotateX(45deg);
            animation: orbitSvgFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }
        .slide-container.active .radar-svg {
            opacity: 0;
            transform: scale(0.9);
            animation: radarSvgFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }
        @keyframes orbitSvgFadeIn {
            to { opacity: 1; transform: scale(1) rotateX(55deg) rotateY(-10deg); }
        }
        @keyframes radarSvgFadeIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Smaller panel body font in horizontal pipeline */
        .architecture-grid.pipeline-mode .panel-body {
            font-size: clamp(0.9rem, 1.15vw, 1.1rem);
            line-height: 1.4;
        }

        /* Staggered Delays */
        .animate-delay-1 { animation-delay: 0.08s; }
        .animate-delay-2 { animation-delay: 0.16s; }
        .animate-delay-3 { animation-delay: 0.24s; }
        .animate-delay-4 { animation-delay: 0.32s; }
        .animate-delay-5 { animation-delay: 0.40s; }
        .animate-delay-6 { animation-delay: 0.48s; }

        @media (max-width: 760px) {
            .topbar {
                top: 10px;
                left: 10px;
                right: 10px;
            }

            .brand {
                display: none;
            }

            .export-btn {
                height: 40px;
                padding: 0 12px;
                font-size: 0.78rem;
            }

            .nav {
                bottom: 10px;
            }
        }

        @media print {
            html,
            body {
                width: 16in;
                height: auto;
                overflow: visible;
                margin: 0;
                padding: 0;
                display: block;
            }

            body::before {
                display: none;
            }

            .deck-shell {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: unset !important;
                transform: none !important;
                position: static !important;
                display: block !important;
            }

            .slide-container {
                position: relative !important;
                inset: auto !important;
                display: flex !important;
                width: 10in !important;
                height: 5.625in !important;
                margin: 0 auto !important;
                page-break-after: always;
                page-break-inside: avoid;
                break-after: page;
                break-inside: avoid;
                border-radius: 0 !important;
                box-shadow: none !important;
                opacity: 1 !important;
                animation: none !important;
            }

            .slide-container::before,
            .slide-container::after {
                display: none;
            }

            .hero-visual::before {
                animation: none !important;
            }

            .no-print,
            .stale-banner {
                display: none !important;
            }
        }

        @media print {
            @page {
                size: 10in 5.625in;
                margin: 0;
            }

            body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                background-color: #050716 !important;
            }
        }

        body.printing {
            overflow: auto;
            display: block;
            padding-bottom: 0;
        }

        body.printing .deck-shell {
            width: 100% !important;
            height: auto !important;
            transform: none !important;
            position: static !important;
            display: block !important;
        }

        body.printing .slide-container {
            position: relative !important;
            inset: auto !important;
            display: flex !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="staleBanner" class="stale-banner no-print" role="status"></div>

    <div class="topbar no-print">
        <div class="brand"><span class="brand-mark"></span>DocuMind Slide Deck</div>
        <button class="export-btn" type="button" id="exportPdfBtn">Export to PDF</button>
    </div>

    <main class="deck-shell" id="deckShell"></main>

    <nav class="nav no-print">
        <button type="button" id="prevBtn" aria-label="Previous slide">&lt;</button>
        <div class="counter" id="counter">1 / 5</div>
        <button type="button" id="nextBtn" aria-label="Next slide">&gt;</button>
    </nav>

    <script>
        const LAYOUTS = ["COVER", "EXECUTIVE_SUMMARY", "ARCHITECTURE_TWO_COLUMN", "DATA_METRICS", "CONCLUSION"];
        const MIDDLE_LAYOUTS = ["EXECUTIVE_SUMMARY", "DATA_METRICS", "ARCHITECTURE_TWO_COLUMN", "EXECUTIVE_SUMMARY", "DATA_METRICS"];
        const SLIDE_ENGINE_VERSION = "9";

        const METRIC_CARD_THEMES = [
            ["#60A5FA", "#3B82F6"], // Cobalt Blue
            ["#2DD4BF", "#14B8A6"], // Emerald Teal
            ["#A78BFA", "#8B5CF6"], // Violet Purple
            ["#F87171", "#EF4444"]  // Coral Red
        ];

        const ACCENTS = [
            ["#818CF8", "#60A5FA"], // Indigo - Blue
            ["#2DD4BF", "#34D399"], // Teal - Emerald
            ["#A78BFA", "#C084FC"], // Violet - Purple
            ["#60A5FA", "#22D3EE"], // Blue - Cyan
            ["#F87171", "#FB7185"], // Coral - Pink
            ["#FB923C", "#FBBF24"]  // Orange - Gold
        ];
        let slides = [];
        let current = 0;

        function escapeHtml(value) {
            const div = document.createElement("div");
            div.textContent = value == null ? "" : String(value);
            return div.innerHTML;
        }

        function asArray(value) {
            if (Array.isArray(value)) return value.map(String).filter(Boolean);
            if (value == null) return [];
            return [String(value)];
        }

        function stripSidePrefix(text) {
            return String(text || "").trim().replace(/^(left|right)\s*:\s*/i, "");
        }

        function splitInsight(value, fallbackLabel) {
            let raw = stripSidePrefix(value);
            if (raw.includes("|")) {
                const [label, ...rest] = raw.split("|");
                const cleanLabel = stripSidePrefix(label || "").trim();
                const body = rest.join("|").trim();
                return {
                    label: cleanLabel || fallbackLabel,
                    body: body || raw
                };
            }
            const parts = raw.split(":");
            if (parts.length > 1) {
                const label = stripSidePrefix(parts.shift().trim());
                const body = parts.join(":").trim();
                if (/^(left|right)$/i.test(label)) {
                    return { label: fallbackLabel, body: body || raw };
                }
                if (!body && label.length > 0) {
                    return { label: fallbackLabel, body: label };
                }
                return {
                    label: label || fallbackLabel,
                    body: body || raw
                };
            }
            // If there's no colon or pipe, try to split at the first 2-3 words (up to 16 chars) to make a dynamic label
            const words = raw.split(/\s+/);
            if (words.length > 4) {
                let labelWordsCount = 2;
                let candidateLabel = words.slice(0, labelWordsCount).join(" ");
                if (candidateLabel.length < 8 && words.length > 5) {
                    labelWordsCount = 3;
                    candidateLabel = words.slice(0, labelWordsCount).join(" ");
                }
                if (candidateLabel.length <= 16) {
                    return {
                        label: candidateLabel,
                        body: words.slice(labelWordsCount).join(" ")
                    };
                }
            }
            return { label: fallbackLabel, body: raw };
        }

        function normalizeArchPanel(value, fallbackLabel, fallbackIcon) {
            const parsed = splitInsight(value, fallbackLabel);
            let label = parsed.label;
            let body = parsed.body;
            if (/^(left|right)$/i.test(label)) {
                body = body || label;
                label = fallbackLabel;
            }
            if (body && body.length < 60 && !label || label === fallbackLabel) {
                const words = body.split(/\s+/);
                if (words.length <= 4) {
                    label = body;
                    body = "";
                }
            }
            return {
                label: label || fallbackLabel,
                body: body || label,
                icon: fallbackIcon
            };
        }

        function getSvgIcon(type, color = "currentColor") {
            const svgs = {
                lightning: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
                database: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>`,
                shield: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
                key: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>`,
                settings: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
                chart: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
                trendingUp: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
                mic: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
                cpu: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>`,
                star: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
                activity: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
                vietnam: `<svg class="slide-icon-svg" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2"><path d="M12 2L15 9H22L17 14L19 21L12 17L5 21L7 14L2 9H9L12 2Z" fill="${color}" stroke="${color}"/></svg>`
            };
            return svgs[type] || svgs.star;
        }

        function getIconForText(text, index) {
            const s = String(text || "").toLowerCase();
            if (/hồ chí|lịch sử|di sản|văn hóa|việt nam/i.test(s)) return "vietnam";
            if (/fastapi|api|rag|chroma|lightning|tốc độ/i.test(s)) return "lightning";
            if (/adapter|llm|groq|gemini|database|tiến trình/i.test(s)) return "database";
            if (/python|pandas|sandbox|data|chỉ số|chất lượng/i.test(s)) return "chart";
            if (/podcast|tts|audio|edge/i.test(s)) return "mic";
            if (/bảo mật|auth|jwt|riêng/i.test(s)) return "shield";
            if (/mã hóa|khóa/i.test(s)) return "key";
            if (/settings|config|xử lý|chạy/i.test(s)) return "settings";
            if (/chỉ số|tỷ lệ|tăng trưởng|phát triển/i.test(s)) return "trendingUp";
            return ["star", "activity", "cpu", "lightning"][index % 4];
        }

        function summaryIcon(text, index) {
            const iconName = getIconForText(text, index);
            return getSvgIcon(iconName, "var(--card-a)");
        }

        // Derive a real progress percentage from a metric value when possible
        // (e.g. "95%" -> 95, "3x" -> 60). Returns null when the value is not numeric.
        function metricPercent(valueStr) {
            const s = String(valueStr || "");
            const pctMatch = s.match(/(\d+(?:[.,]\d+)?)\s*%/);
            if (pctMatch) return Math.max(4, Math.min(100, parseFloat(pctMatch[1].replace(",", "."))));
            const xMatch = s.match(/(\d+(?:[.,]\d+)?)\s*x/i);
            if (xMatch) return Math.max(20, Math.min(100, parseFloat(xMatch[1].replace(",", ".")) * 20));
            const numMatch = s.match(/^\s*(\d+(?:[.,]\d+)?)\b/);
            if (numMatch) {
                const n = parseFloat(numMatch[1].replace(",", "."));
                return Math.max(10, Math.min(100, n));
            }
            return null;
        }

        function splitMetric(value, index) {
            const raw = String(value || "").trim();
            const [left, notePart] = raw.split("|");
            const hasDelimiter = String(left || "").includes(":");
            
            let label = `Điểm nhấn ${index + 1}`;
            let valPart = "";
            let note = (notePart || "").trim();

            if (hasDelimiter) {
                const parts = left.split(":");
                label = parts[0].trim();
                valPart = parts.slice(1).join(":").trim();
            } else {
                valPart = left || raw;
            }

            // Clean the value part using regex to get the key metric
            const metricRegex = /(24\/7|\d+(?:[.,]\d+)?\s*(?:%|x|tỷ|triệu|k|M|B|USD|đ|fps|req\/s|s|trang)?(?:\s+đồng|\s+USD)?|low|medium|high|cao|thấp|trung bình)/i;
            const match = valPart.match(metricRegex);
            let finalValue = "";
            
            if (match) {
                finalValue = match[0].trim();
                if (!hasDelimiter) {
                    let cleanLabel = valPart.replace(finalValue, "").replace(/[|:|;,\-\s]+/g, " ").trim();
                    if (cleanLabel.length > 3) {
                        label = cleanLabel;
                    }
                }
            } else {
                const words = valPart.split(/\s+/);
                if (words.length <= 3) {
                    finalValue = valPart;
                } else {
                    finalValue = words.slice(0, 2).join(" ").slice(0, 15);
                }
            }

            if (!note) {
                note = raw;
            }

            return {
                label: label,
                value: finalValue || `0${index + 1}`,
                note: note,
                pct: metricPercent(finalValue),
                long: finalValue.length > 8
            };
        }

        function heroTags(slide) {
            const pick = (text) => {
                const raw = String(text || "").trim();
                const words = raw.split(/\s+/).slice(0, 2).join(" ");
                if (words.length <= 14) return words.toUpperCase();
                return words.slice(0, 12).trim() + "…";
            };
            const tags = slide.content.slice(0, 3).map(pick);
            while (tags.length < 3) tags.push(["INSIGHT", "DATA", "IMPACT"][tags.length]);
            return tags;
        }

        function coverHeroIcon(slide) {
            const blob = `${slide.title} ${slide.kicker} ${(slide.content || []).join(" ")}`.toLowerCase();
            const iconName = getIconForText(blob, 0);
            return getSvgIcon(iconName, "var(--accent)");
        }

        function coverCaption(slide) {
            const first = String(slide.content?.[0] || "").trim();
            if (first.length >= 12) return first;
            const vp = String(slide.visual_prompt || "").trim();
            if (vp.length > 120) return vp.slice(0, 117) + "…";
            return vp || first || "Trình chiếu từ tài liệu nghiên cứu";
        }

        function fallbackSlides() {
            return [
                {
                    layout: "COVER",
                    kicker: "PITCH DECK",
                    title: "Enterprise Knowledge Platform",
                    content: ["Trusted answers from complex documents", "Executive workflows with measurable acceleration", "Premium narrative for strategic alignment"],
                    visual_prompt: "Dark SaaS command center with luminous knowledge graph"
                },
                {
                    layout: "EXECUTIVE_SUMMARY",
                    kicker: "KEY SIGNALS",
                    title: "Executive Summary",
                    content: ["Knowledge work needs faster synthesis", "Retrieval improves confidence and traceability", "Automation compresses preparation cycles", "Pilot metrics should guide scale"],
                    visual_prompt: "Four executive insight cards on dark glass dashboard"
                },
                {
                    layout: "DATA_METRICS",
                    kicker: "IMPACT",
                    title: "Performance Signals",
                    content: ["Speed: 3x | Faster executive preparation", "Reuse: 2x | More value from uploaded assets", "Quality: 95% | Better grounded confidence", "Cost: Low | Focused pilot investment"],
                    visual_prompt: "Premium KPI wall with luminous metric tiles"
                },
                {
                    layout: "ARCHITECTURE_TWO_COLUMN",
                    kicker: "SYSTEM VIEW",
                    title: "Operating Architecture",
                    content: ["Current state: Fragmented context slows decisions", "Target state: Retrieval layer converts documents into trusted answers"],
                    visual_prompt: "Two-column architecture with connected neon nodes"
                },
                {
                    layout: "EXECUTIVE_SUMMARY",
                    kicker: "PRIORITIES",
                    title: "Execution Priorities",
                    content: ["Choose repeated high-friction workflows", "Keep source traceability visible", "Measure quality before scale", "Automate after confidence is proven"],
                    visual_prompt: "Executive priority matrix with glass panels"
                },
                {
                    layout: "DATA_METRICS",
                    kicker: "VALUE CASE",
                    title: "Impact Metrics",
                    content: ["Speed: 3x | Faster synthesis cycles", "Quality: 95% | Higher answer confidence", "Coverage: 5 flows | Broader workflow activation", "Risk: Low | Controlled rollout path"],
                    visual_prompt: "Premium KPI wall with cyber-lime numbers"
                },
                {
                    layout: "ARCHITECTURE_TWO_COLUMN",
                    kicker: "ROLLOUT",
                    title: "Implementation Model",
                    content: ["Pilot scope: Validate one critical document workflow", "Scale path: Expand after measurable quality thresholds"],
                    visual_prompt: "Dark roadmap architecture with staged rollout gates"
                },
                {
                    layout: "EXECUTIVE_SUMMARY",
                    kicker: "GOVERNANCE",
                    title: "Control Model",
                    content: ["Define source freshness expectations", "Review answer quality weekly", "Track adoption by workflow", "Maintain escalation paths for uncertainty"],
                    visual_prompt: "Governance dashboard with premium audit trails"
                },
                {
                    layout: "DATA_METRICS",
                    kicker: "ROI",
                    title: "Adoption Economics",
                    content: ["Time saved: 40% | Less manual synthesis", "Users: 25+ | Pilot-ready group", "Accuracy: High | Grounded response generation", "Payback: Fast | Immediate workflow compression"],
                    visual_prompt: "Financial value dashboard with elegant dark metrics"
                },
                {
                    layout: "CONCLUSION",
                    kicker: "NEXT MOVES",
                    title: "Recommended Path Forward",
                    content: ["Approve focused pilot scope", "Instrument quality and adoption metrics", "Scale after evidence-based validation"],
                    visual_prompt: "Executive roadmap path with luminous decision point"
                }
            ];
        }

        function normalizeSlides(rawSlides) {
            const source = Array.isArray(rawSlides) && rawSlides.length ? rawSlides : fallbackSlides();
            const fallbacks = fallbackSlides();

            return source.map((rawSlide, index) => {
                const fallback = fallbacks[index % fallbacks.length];
                const raw = rawSlide && typeof rawSlide === "object" ? rawSlide : fallback;
                let layout = String(raw.layout || "").trim().toUpperCase();
                if (!LAYOUTS.includes(layout)) {
                    layout = index === 0 ? "COVER" : (index === source.length - 1 ? "CONCLUSION" : MIDDLE_LAYOUTS[(index - 1) % MIDDLE_LAYOUTS.length]);
                }
                if (index === 0) layout = "COVER";
                if (index === source.length - 1 && source.length > 1) layout = "CONCLUSION";
                return {
                    layout,
                    kicker: String(raw.kicker || fallback.kicker).trim(),
                    title: String(raw.title || fallback.title).trim(),
                    content: asArray(raw.content).length ? asArray(raw.content) : fallback.content,
                    visual_prompt: String(raw.visual_prompt || fallback.visual_prompt).trim()
                };
            });
        }

        function sectionStyle(index) {
            const pair = ACCENTS[index % ACCENTS.length];
            return `style="--accent:${pair[0]};--accent2:${pair[1]}"`;
        }

        function metricIcon(label, value, index) {
            const iconName = getIconForText(label + " " + value, index);
            return getSvgIcon(iconName, "var(--card-a)");
        }

        function slideHeader(slide, titleClass = "medium", compact = false) {
            return `
                <div class="${compact ? "slide-header-compact" : "slide-header"}">
                    <div class="kicker">${escapeHtml(slide.kicker || slide.layout)}</div>
                    <h1 class="title ${titleClass}"><span class="title-gradient">${escapeHtml(slide.title)}</span></h1>
                </div>
            `;
        }

        function renderCover(slide, index) {
            const tags = heroTags(slide);
            return `
                <section class="slide-container cover" data-index="${index}" ${sectionStyle(index)}>
                    <div class="slide-bg-decoration" aria-hidden="true"></div>
                    <div class="slide-inner cover">
                        <div class="cover-copy">
                            ${slideHeader(slide, "")}
                            <div class="cover-bullets">
                                ${slide.content.slice(0, 3).map((item, idx) => `<div class="cover-bullet animate-delay-${idx + 1}"><span>${escapeHtml(item)}</span></div>`).join("")}
                            </div>
                        </div>
                        <div class="hero-visual animate-delay-2">
                            <div class="hero-mesh"></div>
                            <div class="orbit-container" aria-hidden="true">
                                <svg class="orbit-svg" viewBox="0 0 200 200">
                                    <circle class="orbit-ring orbit-ring-slow" cx="100" cy="100" r="80" stroke="url(#orbit-grad-${index})" stroke-width="1" stroke-dasharray="8, 6" fill="none" />
                                    <circle class="orbit-ring orbit-ring-fast" cx="100" cy="100" r="55" stroke="url(#orbit-grad-2-${index})" stroke-width="1.5" stroke-dasharray="4, 12" fill="none" />
                                    <circle class="orbit-ring orbit-ring-reverse" cx="100" cy="100" r="30" stroke="var(--accent)" stroke-width="1" stroke-dasharray="20, 4" fill="none" opacity="0.6" />
                                    <circle class="orbit-node node-1" cx="100" cy="20" r="6" fill="var(--accent2)" />
                                    <circle class="orbit-node node-2" cx="100" cy="145" r="5" fill="var(--accent)" />
                                    <circle class="orbit-core" cx="100" cy="100" r="15" fill="url(#core-grad-${index})" />
                                    <defs>
                                        <linearGradient id="orbit-grad-${index}" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.8" />
                                            <stop offset="100%" stop-color="transparent" />
                                        </linearGradient>
                                        <linearGradient id="orbit-grad-2-${index}" x1="100%" y1="0%" x2="0%" y2="100%">
                                            <stop offset="0%" stop-color="var(--accent2)" stop-opacity="0.8" />
                                            <stop offset="100%" stop-color="transparent" />
                                        </linearGradient>
                                        <radialGradient id="core-grad-${index}" cx="50%" cy="50%" r="50%">
                                            <stop offset="0%" stop-color="#fff" />
                                            <stop offset="40%" stop-color="var(--accent)" />
                                            <stop offset="100%" stop-color="transparent" />
                                        </radialGradient>
                                    </defs>
                                </svg>
                            </div>
                            <p class="hero-visual-caption" style="margin-top: 10px;">${escapeHtml(coverCaption(slide))}</p>
                            <div class="hero-tags">
                                ${tags.map((t) => `<span class="hero-tag">${escapeHtml(t)}</span>`).join("")}
                            </div>
                        </div>
                    </div>
                    ${renderFooter(slide, index)}
                </section>
            `;
        }

        function renderExecutiveSummary(slide, index) {
            const themes = METRIC_CARD_THEMES;
            const len = slide.content.length;
            let cols = '1fr 1fr';
            let rows = '1fr 1fr';
            let maxW = 'none';
            if (len === 1) {
                cols = '1fr';
                rows = '1fr';
                maxW = '640px';
            } else if (len === 2) {
                cols = '1.3fr 0.7fr';
                rows = '1fr';
            } else if (len === 3) {
                cols = '1.4fr 1fr 1fr';
                rows = '1fr';
            } else if (len === 4) {
                cols = '1.4fr 1fr';
                rows = 'repeat(3, 1fr)';
            } else if (len === 5) {
                cols = 'repeat(3, 1fr)';
                rows = '1fr 1fr';
            } else {
                cols = 'repeat(3, 1fr)';
                rows = 'auto';
            }
            return `
                <section class="slide-container summary" data-index="${index}" ${sectionStyle(index)}>
                    <div class="slide-bg-decoration" aria-hidden="true"></div>
                    <div class="slide-inner summary">
                        ${slideHeader(slide, "medium", true)}
                        <div class="slide-body-fill" style="align-items: center; justify-content: center;">
                            <div class="summary-grid" style="grid-template-columns: ${cols}; grid-template-rows: ${rows}; width: 100%; max-width: ${maxW}; margin: 0 auto;">
                            ${slide.content.map((item, idx) => {
                                const t = themes[idx % themes.length];
                                const isSpotlight = len > 1 && idx === 0;
                                const spotlightClass = isSpotlight ? "hero-spotlight" : "";
                                let gridSpanStyle = '';
                                if (len === 4 && idx === 0) {
                                    gridSpanStyle = 'grid-row: span 3;';
                                } else if (len === 5 && idx === 0) {
                                    gridSpanStyle = 'grid-column: span 2;';
                                }
                                return `
                                <div class="summary-card ${spotlightClass} animate-delay-${idx + 1}" style="--card-a:${t[0]};--card-b:${t[1]}; ${gridSpanStyle}">
                                    <div class="summary-card-top">
                                        <span class="card-icon" aria-hidden="true">${summaryIcon(item, idx)}</span>
                                        <span class="card-index">0${idx + 1}</span>
                                    </div>
                                    <div class="card-text">${escapeHtml(item)}</div>
                                </div>
                            `;
                            }).join("")}
                            </div>
                        </div>
                    </div>
                    ${renderFooter(slide, index)}
                </section>
            `;
        }

        function renderArchitecture(slide, index) {
            const labels = ["Component", "Module", "Service", "Layer", "Logic", "Strategy"];
            const panels = slide.content.map((item, idx) => {
                const parsed = normalizeArchPanel(item, labels[idx % labels.length], "");
                const iconName = getIconForText(item, idx);
                parsed.icon = getSvgIcon(iconName, "var(--accent)");
                return parsed;
            });
            const flowSteps = panels
                .map(p => p.label)
                .filter(l => l && !/^(component|module|service|layer|logic|strategy|thành phần|tiến trình|chức năng)\b/i.test(l));
            const hasFlow = flowSteps.length >= 2;
            const flowStripHtml = hasFlow ? `
                <div class="arch-flow-strip animate-delay-${panels.length + 1}" aria-hidden="true">
                    ${flowSteps.map((name, i) => `
                        ${i > 0 ? '<span class="arch-flow-arrow">→</span>' : ""}
                        <span class="arch-flow-step">${escapeHtml(name)}</span>
                    `).join("")}
                </div>
