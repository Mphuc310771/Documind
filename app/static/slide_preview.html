            ` : "";

            const isPipeline = panels.length >= 2 && panels.length <= 4;
            let gridHtml = "";
            if (isPipeline) {
                gridHtml = `
                    <div class="architecture-grid pipeline-mode">
                    ${panels.map((panel, idx) => {
                        const arrowHtml = (idx < panels.length - 1) ? `
                            <div class="pipeline-arrow animate-delay-${idx + 1}" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </div>
                        ` : "";
                        return `
                            <div class="architecture-panel animate-delay-${idx + 1}">
                                <div class="panel-head">
                                    <span class="panel-icon" aria-hidden="true">${panel.icon}</span>
                                    <div class="panel-label">${escapeHtml(panel.label)}</div>
                                </div>
                                <div class="panel-body">${escapeHtml(panel.body)}</div>
                                <div class="panel-lines"><span></span><span></span><span></span></div>
                            </div>
                            ${arrowHtml}
                        `;
                    }).join("")}
                    </div>
                `;
            } else {
                const cols = Math.min(Math.max(panels.length, 1), 2);
                gridHtml = `
                    <div class="architecture-grid" style="grid-template-columns: repeat(${cols}, 1fr);">
                    ${panels.map((panel, idx) => `
                        <div class="architecture-panel animate-delay-${idx + 1}">
                            <div class="panel-head">
                                <span class="panel-icon" aria-hidden="true">${panel.icon}</span>
                                <div class="panel-label">${escapeHtml(panel.label)}</div>
                            </div>
                            <div class="panel-body">${escapeHtml(panel.body)}</div>
                            <div class="panel-lines"><span></span><span></span><span></span></div>
                        </div>
                    `).join("")}
                    </div>
                `;
            }

            return `
                <section class="slide-container architecture" data-index="${index}" ${sectionStyle(index)}>
                    <div class="slide-bg-decoration" aria-hidden="true"></div>
                    <div class="slide-inner architecture">
                        ${slideHeader(slide, "medium", true)}
                        <div class="slide-body-fill architecture-layout">
                            ${gridHtml}
                            ${flowStripHtml}
                        </div>
                    </div>
                    ${renderFooter(slide, index)}
                </section>
            `;
        }

        function renderMetrics(slide, index) {
            const metrics = slide.content.map((item, idx) => splitMetric(item, idx));
            const hasDashboard = metrics.length >= 2;
            let bodyHtml = "";

            function getMetricVisuals(metric, idx, isHero = false) {
                const theme = METRIC_CARD_THEMES[idx % METRIC_CARD_THEMES.length];
                const icon = metricIcon(metric.label, metric.value, idx);
                const valStr = String(metric.value).trim();
                const hasPct = valStr.includes("%");
                let rightVisual = "";
                let bottomVisual = "";
                if (metric.pct != null && hasPct) {
                    const radius = isHero ? 36 : 18;
                    const strokeWidth = isHero ? 6 : 3.5;
                    const circ = 2 * Math.PI * radius;
                    const offset = circ - (metric.pct / 100) * circ;
                    const gradId = `gauge-grad-${index}-${idx}-${isHero ? 'hero' : 'tile'}`;
                    const size = isHero ? 88 : 46;
                    rightVisual = `
                        <div class="metric-gauge-wrap" style="width:${size}px; height:${size}px;" title="${metric.pct}%">
                            <svg class="metric-gauge-svg" viewBox="0 0 ${size * 2} ${size * 2}">
                                <circle class="gauge-bg" cx="${size}" cy="${size}" r="${radius}" stroke="rgba(255, 255, 255, 0.05)" stroke-width="${strokeWidth}" fill="none" />
                                <circle class="gauge-fill" cx="${size}" cy="${size}" r="${radius}" stroke="url(#${gradId})" stroke-width="${strokeWidth}" fill="none"
                                        stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
                                        stroke-linecap="round" transform="rotate(-90 ${size} ${size})">
                                    <animate attributeName="stroke-dashoffset" from="${circ}" to="${offset}" dur="1.2s" cubic-bezier="0.16, 1, 0.3, 1" fill="freeze" />
                                </circle>
                                <defs>
                                    <linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="${theme[0]}" />
                                        <stop offset="100%" stop-color="${theme[1]}" />
                                    </linearGradient>
                                </defs>
                            </svg>
                            <div class="metric-gauge-pct" style="font-size: ${isHero ? '1.1rem' : '0.75rem'};">${Math.round(metric.pct)}%</div>
                        </div>
                    `;
                } else if (/^[+-]?\d+(?:\.\d+)?\s*(?:x|%|tỷ|triệu|k|M|B|USD|đ|fps|req\/s|s|trang)?$/i.test(valStr) || valStr.includes("x") || valStr.includes("+") || valStr.includes("-")) {
                    const isUp = valStr.includes("+") || valStr.includes("x") || parseFloat(valStr) > 1;
                    const isDown = valStr.includes("-");
                    if (isUp) {
                        bottomVisual = `<div class="metric-trend-badge up" style="${isHero ? 'margin-top: 12px;' : 'margin-top: 2px; font-size: 0.7rem; padding: 3px 8px;'}">↗ Tăng trưởng</div>`;
                    } else if (isDown) {
                        bottomVisual = `<div class="metric-trend-badge down" style="${isHero ? 'margin-top: 12px;' : 'margin-top: 2px; font-size: 0.7rem; padding: 3px 8px;'}">▼ Giảm thiểu</div>`;
                    } else {
                        const percentVal = metric.pct || 50;
                        bottomVisual = `<div class="metric-bar" style="${isHero ? 'margin-top: 12px; height: 6px;' : 'margin-top: 4px; height: 4px; width: 60px;'}" title="${percentVal}%"><span style="width:${percentVal}%"></span></div>`;
                    }
                    rightVisual = isHero ? `<span class="metric-icon" aria-hidden="true">${icon}</span>` : `<span class="metric-icon" style="width: 32px; height: 32px;" aria-hidden="true">${icon}</span>`;
                } else if (/^(low|medium|high|cao|thấp|trung bình|active|sẵn sàng)$/i.test(valStr)) {
                    bottomVisual = `<div class="metric-status-badge" style="${isHero ? '' : 'margin-top: 2px; font-size: 0.65rem; padding: 3px 8px;'}">${valStr}</div>`;
                    rightVisual = isHero ? `<span class="metric-icon" aria-hidden="true">${icon}</span>` : `<span class="metric-icon" style="width: 32px; height: 32px;" aria-hidden="true">${icon}</span>`;
                } else {
                    bottomVisual = `<div class="metric-bar" style="${isHero ? 'margin-top: 12px; height: 6px;' : 'margin-top: 4px; height: 4px; width: 60px;'}" title="100%"><span style="width:100%"></span></div>`;
                    rightVisual = isHero ? `<span class="metric-icon" aria-hidden="true">${icon}</span>` : `<span class="metric-icon" style="width: 32px; height: 32px;" aria-hidden="true">${icon}</span>`;
                }
                return { rightVisual, bottomVisual, theme };
            }

            if (hasDashboard) {
                const heroMetric = metrics[0];
                const heroVis = getMetricVisuals(heroMetric, 0, true);
                const heroValClass = heroMetric.long ? "metric-value metric-value--long" : "metric-value";
                const tilesHtml = metrics.slice(1).map((tileMetric, idx) => {
                    const realIdx = idx + 1;
                    const tileVis = getMetricVisuals(tileMetric, realIdx, false);
                    const tileValClass = tileMetric.long ? "metric-value metric-value--long" : "metric-value";
                    return `
                        <div class="metric-tile-card animate-delay-${realIdx + 1}" style="--card-a:${tileVis.theme[0]};--card-b:${tileVis.theme[1]}">
                            <div class="metric-tile-left">
                                <div class="metric-label">${escapeHtml(tileMetric.label)}</div>
                                <div class="${tileValClass}">${escapeHtml(tileMetric.value)}</div>
                                <div class="metric-note">${escapeHtml(tileMetric.note)}</div>
                            </div>
                            <div class="metric-tile-right">
                                ${tileVis.rightVisual}
                                ${tileVis.bottomVisual}
                            </div>
                        </div>
                    `;
                }).join("");
                bodyHtml = `
                    <div class="metrics-grid dashboard-mode">
                        <div class="metric-hero-card animate-delay-1" style="--card-a:${heroVis.theme[0]};--card-b:${heroVis.theme[1]}">
                            <div class="metric-hero-top">
                                ${heroVis.rightVisual}
                                <span class="metric-chip">HERO</span>
                            </div>
                            <div class="metric-hero-body">
                                <div class="metric-hero-left">
                                    <div class="metric-label">${escapeHtml(heroMetric.label)}</div>
                                    <div class="${heroValClass}">${escapeHtml(heroMetric.value)}</div>
                                    <div class="metric-note">${escapeHtml(heroMetric.note)}</div>
                                </div>
                                <div class="metric-hero-right">
                                    ${heroVis.bottomVisual}
                                </div>
                            </div>
                        </div>
                        <div class="metric-tiles-grid">
                            ${tilesHtml}
                        </div>
                    </div>
                `;
            } else {
                const singleMetric = metrics[0];
                const singleVis = getMetricVisuals(singleMetric, 0, true);
                const singleValClass = singleMetric.long ? "metric-value metric-value--long" : "metric-value";
                bodyHtml = `
                    <div class="metrics-grid" style="grid-template-columns: 1fr;">
                        <div class="metric-card animate-delay-1" style="--card-a:${singleVis.theme[0]};--card-b:${singleVis.theme[1]}; max-width: 600px; margin: 0 auto; width: 100%;">
                            <div class="metric-card-top">
                                ${singleVis.rightVisual}
                                <span class="metric-chip">01</span>
                            </div>
                            <div class="metric-card-content">
                                <div class="metric-card-info">
                                    <div class="metric-label">${escapeHtml(singleMetric.label)}</div>
                                    <div class="${singleValClass}">${escapeHtml(singleMetric.value)}</div>
                                    <div class="metric-note">${escapeHtml(singleMetric.note)}</div>
                                    ${singleVis.bottomVisual}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            return `
                <section class="slide-container metrics" data-index="${index}" ${sectionStyle(index)}>
                    <div class="slide-bg-decoration" aria-hidden="true"></div>
                    <div class="slide-inner metrics">
                        ${slideHeader(slide, "medium", true)}
                        <div class="slide-body-fill metrics-stage">
                            ${bodyHtml}
                        </div>
                    </div>
                    ${renderFooter(slide, index)}
                </section>
            `;
        }

        function getConclusionMilestones(slide) {
            const items = asArray(slide.content);
            return items.map((item, idx) => {
                const parsed = splitInsight(item, `Bước ${idx + 1}`);
                return {
                    title: parsed.label,
                    desc: parsed.body
                };
            });
        }

        function renderConclusion(slide, index) {
            const milestones = getConclusionMilestones(slide);
            return `
                <section class="slide-container conclusion" data-index="${index}" ${sectionStyle(index)}>
                    <div class="slide-bg-decoration" aria-hidden="true"></div>
                    <div class="slide-inner conclusion">
                        <div class="conclusion-copy">
                            ${slideHeader(slide, "medium", true)}
                            <div class="conclusion-timeline">
                                <div class="actions">
                                    ${slide.content.slice(0, 3).map((item, idx) => `
                                        <div class="action-card animate-delay-${idx + 1}">
                                            <div class="action-number">${idx + 1}</div>
                                            <div class="action-text">${escapeHtml(item)}</div>
                                        </div>
                                    `).join("")}
                                </div>
                            </div>
                        </div>
                        <div class="milestones-panel animate-delay-4">
                            <div class="radar-mini-widget" aria-hidden="true">
                                <svg class="radar-svg" viewBox="0 0 200 200">
                                    <circle cx="100" cy="100" r="90" stroke="var(--accent2)" stroke-width="0.75" fill="none" opacity="0.15" />
                                    <circle cx="100" cy="100" r="65" stroke="var(--accent2)" stroke-width="0.75" fill="none" opacity="0.25" />
                                    <circle cx="100" cy="100" r="40" stroke="var(--accent)" stroke-width="0.75" fill="none" opacity="0.35" />
                                    <circle cx="100" cy="100" r="15" stroke="var(--accent)" stroke-width="0.75" fill="none" opacity="0.45" />
                                    <line x1="100" y1="10" x2="100" y2="190" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
                                    <line x1="10" y1="100" x2="190" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
                                    <g class="radar-sweep">
                                        <line x1="100" y1="100" x2="100" y2="10" stroke="url(#sweep-grad-${index})" stroke-width="2.5" />
                                    </g>
                                    <g class="radar-blips">
                                        <circle cx="70" cy="60" r="4" fill="var(--accent2)" class="blip blip-1" />
                                        <circle cx="140" cy="120" r="5" fill="var(--accent)" class="blip blip-2" />
                                        <circle cx="110" cy="150" r="3.5" fill="var(--accent2)" class="blip blip-3" />
                                    </g>
                                    <defs>
                                        <linearGradient id="sweep-grad-${index}" x1="0%" y1="100%" x2="0%" y2="0%">
                                            <stop offset="0%" stop-color="transparent" />
                                            <stop offset="100%" stop-color="var(--accent2)" stop-opacity="0.9" />
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </div>
                            <div class="milestones-list" style="display: flex; flex-direction: column; gap: 14px; width: 100%;">
                                ${milestones.map((m, idx) => `
                                    <div class="milestone-item">
                                        <div class="milestone-check">✓</div>
                                        <div class="milestone-info">
                                            <div class="milestone-title">${escapeHtml(m.title)}</div>
                                            <div class="milestone-desc">${escapeHtml(m.desc)}</div>
                                        </div>
                                    </div>
                                `).join("")}
                            </div>
                        </div>
                    </div>
                    ${renderFooter(slide, index)}
                </section>
            `;
        }

        function renderFooter(slide, index) {
            return `
                <div class="slide-footer">
                    <span>${escapeHtml(slide.layout.replaceAll("_", " "))}</span>
                    <span>${String(index + 1).padStart(2, "0")} / ${String(slides.length || LAYOUTS.length).padStart(2, "0")}</span>
                </div>
            `;
        }

        function renderDeck() {
            const shell = document.getElementById("deckShell");
            shell.innerHTML = slides.map((slide, index) => {
                if (slide.layout === "COVER") return renderCover(slide, index);
                if (slide.layout === "EXECUTIVE_SUMMARY") return renderExecutiveSummary(slide, index);
                if (slide.layout === "ARCHITECTURE_TWO_COLUMN") return renderArchitecture(slide, index);
                if (slide.layout === "DATA_METRICS") return renderMetrics(slide, index);
                return renderConclusion(slide, index);
            }).join("");
            showSlide(0);
            scaleDeck();
        }

        function exportToPdf() {
            document.body.classList.add("printing");
            document.querySelectorAll(".slide-container").forEach((el) => el.classList.add("active"));
            const cleanup = () => {
                afterPrintCleanup();
                window.removeEventListener("afterprint", cleanup);
            };
            window.addEventListener("afterprint", cleanup);
            setTimeout(() => {
                if (document.body.classList.contains("printing")) afterPrintCleanup();
            }, 1500);
            window.print();
        }

        function afterPrintCleanup() {
            document.body.classList.remove("printing");
            showSlide(current);
        }

        function showSlide(index) {
            current = Math.max(0, Math.min(index, slides.length - 1));
            document.querySelectorAll(".slide-container").forEach((slide, idx) => {
                slide.classList.toggle("active", idx === current);
            });
            document.getElementById("counter").textContent = `${current + 1} / ${slides.length}`;
            document.getElementById("prevBtn").disabled = current === 0;
            document.getElementById("nextBtn").disabled = current === slides.length - 1;
        }

        function scaleDeck() {
            const scale = Math.min((window.innerWidth - 48) / 1280, (window.innerHeight - 140) / 720, 1);
            document.documentElement.style.setProperty("--deck-scale", String(Math.max(0.28, scale)));
        }

        function showStaleBannerIfNeeded(fromCache) {
            const el = document.getElementById("staleBanner");
            if (!el || !fromCache) return;
            let meta = null;
            try {
                meta = JSON.parse(localStorage.getItem("slide_deck_meta") || "null");
            } catch (e) {}
            if (!meta || meta.version !== SLIDE_ENGINE_VERSION) {
                el.textContent = "Bạn đang xem bộ slide cũ (hoặc giao diện mới chưa áp dụng). Hãy tạo lại slide từ Studio, rồi mở tab này (Ctrl+F5 nếu vẫn giống cũ).";
                el.classList.add("visible");
            }
        }

        function load() {
            let parsed = [];
            let fromCache = false;
            try {
                const raw = localStorage.getItem("slide_deck_data");
                if (raw) {
                    parsed = JSON.parse(raw);
                    fromCache = Array.isArray(parsed) && parsed.length > 0;
                }
            } catch (error) {
                parsed = [];
            }
            slides = normalizeSlides(parsed);
            showStaleBannerIfNeeded(fromCache);
            renderDeck();
        }

        document.getElementById("prevBtn").addEventListener("click", () => showSlide(current - 1));
        document.getElementById("nextBtn").addEventListener("click", () => showSlide(current + 1));
        document.getElementById("exportPdfBtn").addEventListener("click", exportToPdf);
        window.addEventListener("resize", scaleDeck);
        document.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight" || event.key === " ") {
                event.preventDefault();
                showSlide(current + 1);
            }
            if (event.key === "ArrowLeft") {
                event.preventDefault();
                showSlide(current - 1);
            }
        });
        window.addEventListener("load", load);
    </script>
</body>
</html>
